name: rkncl_survey_app
description: RKNCL Rastriye Krishi - Field Survey Collection App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.3

  # Offline storage
  shared_preferences: ^2.3.5
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Network connectivity
  connectivity_plus: ^6.1.4

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Krishi_Logo-Tr.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
